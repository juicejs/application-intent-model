server {
  listen 8080;
  listen [::]:8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Serve AIM source files (.aim) as plain text for AI fetch clients.
  location ~* \.aim$ {
    default_type text/plain;
    charset utf-8;
    add_header Access-Control-Allow-Origin "*" always;
    try_files $uri =404;
  }

  # Serve Markdown (.md) as plain text with CORS so AI agents can WebFetch the spec
  # and other Markdown artifacts (AGENTS.md, README.md, /spec/3.0.md, etc.) directly.
  location ~* \.md$ {
    default_type text/plain;
    charset utf-8;
    add_header Access-Control-Allow-Origin "*" always;
    try_files $uri =404;
  }

  location / {
    add_header Access-Control-Allow-Origin "*" always;
    try_files $uri $uri/ =404;
  }

  add_header X-Content-Type-Options "nosniff" always;
}
