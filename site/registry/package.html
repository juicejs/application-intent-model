<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Package Details — AIM Registry</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../assets/site.css">
    <style>
      .detail-container {
        background: white;
        border: 1px solid var(--border-light);
        border-radius: 16px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        height: 80vh;
        max-height: 1000px;
        min-height: 600px;
        margin-top: 12px;
      }

      .preview-header {
        padding: 32px;
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border-light);
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }

      .preview-header h1 {
        font-size: 2.2rem;
        font-weight: 500;
        margin-bottom: 8px;
        color: var(--text-primary);
        line-height: 1.1;
      }

      .preview-header #pkg-display-summary {
        font-size: 1.05rem;
        color: var(--text-secondary);
        margin-bottom: 20px;
        max-width: 800px;
        line-height: 1.5;
      }

      .pkg-meta-row {
        font-size: 0.88rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .preview-body {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      .file-browser {
        width: 300px;
        border-right: 1px solid var(--border-light);
        background: var(--bg-secondary);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
      }

      .package-image-container {
        padding: 24px;
        border-bottom: 1px solid var(--border-light);
        text-align: center;
        background: white;
      }

      .package-image {
        max-width: 100%;
        max-height: 200px;
        border-radius: 12px;
        box-shadow: var(--shadow-md);
        display: none;
      }

      .file-list-header {
        padding: 16px 24px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border-light);
      }

      .file-list {
        list-style: none;
        padding: 8px 0;
        margin: 0;
        overflow-y: auto;
        flex: 1;
      }

      .file-item {
        padding: 10px 24px;
        font-size: 0.88rem;
        font-family: var(--font-mono);
        color: var(--text-secondary);
        cursor: pointer;
        transition: all var(--transition);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .file-item:hover {
        background: var(--bg-tertiary);
        color: var(--primary);
      }

      .file-item.active {
        background: white;
        color: var(--primary);
        font-weight: 500;
        border-left: 4px solid var(--primary);
        padding-left: 20px;
      }

      .code-viewer {
        flex: 1;
        background: #202124;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .code-viewer.is-loading::after {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: var(--google-blue);
        animation: loading-bar 1.5s infinite ease-in-out;
        z-index: 10;
      }

      @keyframes loading-bar {
        0% { left: -20%; width: 20%; }
        50% { left: 40%; width: 40%; }
        100% { left: 100%; width: 20%; }
      }

      .code-window-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 20px;
        background: #2a2d2e;
        border-bottom: 1px solid rgba(255,255,255,0.08);
      }

      .code-window-title {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: #9aa0a6;
      }

      .code-viewer pre {
        flex: 1;
        margin: 0;
        border-radius: 0;
        padding: 24px;
        font-size: 0.85rem;
        line-height: 1.6;
        background: #202124;
        color: #e8eaed;
        overflow: auto;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
        margin: 24px 0 12px 0;
        transition: color var(--transition);
      }

      .back-link:hover {
        color: var(--google-blue);
      }

      @media (max-width: 992px) {
        .preview-body { flex-direction: column; }
        .file-browser { width: 100%; border-right: none; border-bottom: 1px solid var(--border-light); }
        .file-list { display: flex; padding: 8px; gap: 8px; }
        .file-item { padding: 6px 12px; border-radius: 4px; border: 1px solid var(--border); }
        .file-item.active { border-left: 1px solid var(--primary); padding-left: 12px; background: var(--primary); color: white; }
        .detail-container { height: auto; min-height: 800px; }
      }
    </style>
  </head>
  <body data-page="registry" data-base="../">

    <a href="./" class="back-link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Back to Registry
    </a>

    <div class="detail-container">
      <div class="preview-header">
        <div style="flex: 1;">
          <h1 id="pkg-display-name">Loading...</h1>
          <p id="pkg-display-summary">Loading package information...</p>
          <div class="pkg-meta-row">
            <span id="preview-version">...</span>
            <span>&bull;</span>
            <span id="preview-source-link">...</span>
          </div>
        </div>
        <div id="actions-container" style="padding-top: 10px;">
          <!-- Actions populated by JS -->
        </div>
      </div>
      <div class="preview-body">
        <div class="file-browser">
          <div class="package-image-container">
            <img id="pkg-img" src="" alt="Package Cover" class="package-image">
          </div>
          <div class="file-list-header">Files</div>
          <ul class="file-list" id="file-list">
            <!-- Files populated by JS -->
          </ul>
        </div>
        <div class="code-viewer">
          <div class="code-window-bar">
            <span class="code-dot" style="background: #ff5f56;"></span>
            <span class="code-dot" style="background: #ffbd2e;"></span>
            <span class="code-dot" style="background: #27c93f;"></span>
            <span class="code-window-title" id="preview-filename">...</span>
          </div>
          <pre id="preview">Loading package contents...</pre>
        </div>
      </div>
    </div>

    <footer class="footer" style="text-align: center; margin-top: 48px;">
      <p>AIM Open Standard v2.2 &bull; © 2026 <a href='https://juice.com.hr' target='_blank'>Juice d.o.o.</a> &bull; <a href="../">Home</a> &bull; <a href="../spec/">Specification</a></p>
    </footer>

    <script src="../assets/chrome.js"></script>
    <script>
      const indexCandidates = [
        "../registry-files/index.json",
        "/registry-files/index.json",
        "../../registry-files/index.json"
      ];
      const preview = document.getElementById("preview");
      const fileList = document.getElementById("file-list");
      const pkgImg = document.getElementById("pkg-img");
      const previewFilename = document.getElementById("preview-filename");
      const actionsContainer = document.getElementById("actions-container");

      const params = new URLSearchParams(window.location.search);
      const targetPkgName = params.get("name");

      async function fetchFirst(urls) {
        for (const url of urls) {
          try {
            const res = await fetch(url);
            if (res.ok) return { url, res };
          } catch (_) {}
        }
        throw new Error("No candidate path resolved.");
      }

      function resolvePath(rel, indexUrl) {
        const base = indexUrl.replace(/index\.json$/, "");
        if (indexUrl.includes("registry-files/")) {
          return base + String(rel).replace(/^registry\//, "");
        }
        return base + String(rel);
      }

      function htmlEscape(str) {
        return str.replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#39;");
      }

      async function loadFileContent(filePath, indexUrl) {
        const fullUrl = resolvePath(filePath, indexUrl);
        const codeViewer = document.querySelector('.code-viewer');
        previewFilename.textContent = filePath.split("/").pop();
        codeViewer.classList.add('is-loading');

        try {
          const res = await fetch(fullUrl);
          if (!res.ok) throw new Error();
          const text = await res.text();
          preview.textContent = text;
          preview.scrollTop = 0;
        } catch (_) {
          preview.textContent = "Failed to load source.";
        } finally {
          codeViewer.classList.remove('is-loading');
        }
      }

      async function init() {
        if (!targetPkgName) {
          document.getElementById("pkg-display-name").textContent = "Package Not Found";
          document.getElementById("pkg-display-summary").textContent = "No package name provided in URL.";
          return;
        }

        try {
          const { url, res } = await fetchFirst(indexCandidates);
          const data = await res.json();
          const pkg = data.packages.find(p => p.name === targetPkgName);

          if (!pkg) {
            document.getElementById("pkg-display-name").textContent = "Package Not Found";
            document.getElementById("pkg-display-summary").textContent = `The package "${targetPkgName}" does not exist in the registry.`;
            return;
          }

          document.title = `${pkg.name} — AIM Registry`;
          document.getElementById("pkg-display-name").textContent = pkg.name;
          document.getElementById("preview-version").textContent = `Version ${pkg.version}`;
          document.getElementById("preview-source-link").innerHTML = `<a href="${resolvePath(pkg.entry, url)}" target="_blank" rel="noopener" style="color: var(--google-blue); text-decoration: none;">View Entry Source</a>`;
          
          actionsContainer.innerHTML = `<button class="btn primary" onclick="copyBuildCommand('${pkg.name}', this)">Copy build command</button>`;

          if (pkg.image) {
            pkgImg.src = resolvePath(pkg.image, url);
            pkgImg.style.display = "inline-block";
          }

          fileList.innerHTML = "";
          pkg.files.forEach(file => {
            const li = document.createElement("li");
            li.className = "file-item";
            if (file === pkg.entry) li.classList.add("active");
            li.textContent = file.split(pkg.name + "/").pop();
            li.onclick = () => {
              fileList.querySelectorAll(".file-item").forEach(el => el.classList.remove("active"));
              li.classList.add("active");
              loadFileContent(file, url);
            };
            fileList.appendChild(li);
          });

          // Fetch summary for header
          try {
            const entryRes = await fetch(resolvePath(pkg.entry, url));
            const text = await entryRes.text();
            const summaryMatch = text.match(/^\s*SUMMARY:\s*"([^"]+)"/m) || text.match(/^\s*SUMMARY:\s*(.+)$/m);
            if (summaryMatch) document.getElementById("pkg-display-summary").textContent = summaryMatch[1].trim();
          } catch (_) {}

          loadFileContent(pkg.entry, url);
        } catch (e) {
          document.getElementById("pkg-display-name").textContent = "Error";
          document.getElementById("pkg-display-summary").textContent = "Failed to load registry index.";
        }
      }

      function copyBuildCommand(name, btn) {
        const cmd = `build ${name} in React`;
        navigator.clipboard.writeText(cmd).then(() => {
          const originalText = btn.textContent;
          btn.textContent = 'Copied!';
          setTimeout(() => { btn.textContent = originalText; }, 2000);
        });
      }

      init();
    </script>
  </body>
</html>
