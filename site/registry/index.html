<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Package Registry — AIM</title>
    <meta name="description" content="Browse the AIM package registry. Discover intent-driven component packages for AI agents to fetch, materialize, and synthesize into production-ready code.">
    <meta name="author" content="Juice d.o.o.">
    <link rel="canonical" href="https://intentmodel.dev/registry/">
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://intentmodel.dev/registry/">
    <meta property="og:title" content="Package Registry — AIM">
    <meta property="og:description" content="Browse the AIM package registry. Discover intent-driven component packages for AI agents to fetch, materialize, and synthesize into production-ready code.">
    <meta property="og:image" content="https://intentmodel.dev/assets/og-image.png">
    <meta property="og:site_name" content="Application Intent Model">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Package Registry — AIM">
    <meta name="twitter:description" content="Browse the AIM package registry. Discover intent-driven component packages for AI agents to fetch, materialize, and synthesize into production-ready code.">
    <link rel="stylesheet" href="../assets/site.css">
    <!-- 100% privacy-first analytics -->
    <script data-collect-dnt="true" async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
    <style>
      .registry-container {
        background: white;
        border: 1px solid var(--border-light);
        border-radius: 16px;
        margin-top: 0;
        overflow: hidden;
      }
      .registry-table {
        width: 100%;
        border-collapse: collapse;
      }
      .registry-table th {
        background: var(--bg-secondary);
        color: var(--text-secondary);
        font-weight: 500;
        text-align: left;
        padding: 16px 24px;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border-bottom: 1px solid var(--border-light);
      }
      .registry-table td {
        padding: 20px 24px;
        border-bottom: 1px solid var(--border-light);
        vertical-align: middle;
      }
      .registry-table tr:last-child td {
        border-bottom: none;
      }
      .registry-table tr:hover {
        background: var(--bg-secondary);
      }
      .package-name {
        font-family: var(--font-mono);
        color: var(--google-blue);
        font-weight: 500;
        font-size: 1.05rem;
        text-decoration: none;
      }
      .package-name:hover {
        text-decoration: underline;
      }
      .summary-text {
        font-size: 0.95rem;
        color: var(--text-secondary);
        line-height: 1.5;
      }
      
      @media (max-width: 768px) {
        .registry-table thead { display: none; }
        .registry-table td { display: block; padding: 10px 24px; border-bottom: none; }
        .registry-table td:first-child { padding-top: 24px; }
        .registry-table td:last-child { padding-bottom: 24px; border-bottom: 1px solid var(--border-light); text-align: left !important; }
        .registry-table td::before { content: attr(data-label); display: block; font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
      }
    </style>
  </head>
  <body data-page="registry" data-base="../">

    <section class="page-header">
      <p class="label">Open Registry</p>
      <h1>Package Registry</h1>
      <p>Discover and materialize intent-driven component packages. &bull; <a id="index-link" href="../registry-files/index.json">index.json</a></p>
    </section>

    <div class="registry-container">
      <table class="registry-table" aria-label="packages">
        <thead>
          <tr>
            <th>Package</th>
            <th>Version</th>
            <th>Summary</th>
            <th style="text-align: right;">Actions</th>
          </tr>
        </thead>
        <tbody id="pkg-body">
          <tr><td colspan="4" style="text-align: center; color: var(--text-muted); padding: 80px;">Loading registry...</td></tr>
        </tbody>
      </table>
    </div>

    <footer class="footer" style="text-align: center; margin-top: 48px;">
      <p>AIM Open Standard v2.2 &bull; © 2026 <a href='https://juice.com.hr' target='_blank'>Juice d.o.o.</a> &bull; <a href="../">Home</a> &bull; <a href="../spec/">Specification</a></p>
    </footer>

    <script src="../assets/chrome.js"></script>
    <script>
      const indexCandidates = [
        "../registry-files/index.json",
        "/registry-files/index.json",
        "../../registry-files/index.json"
      ];
      const pkgBody = document.getElementById("pkg-body");
      const indexLink = document.getElementById("index-link");

      async function fetchFirst(urls) {
        for (const url of urls) {
          try {
            const res = await fetch(url);
            if (res.ok) return { url, res };
          } catch (_) {}
        }
        throw new Error("No candidate path resolved.");
      }

      function resolvePath(rel, indexUrl) {
        const base = indexUrl.replace(/index\.json$/, "");
        if (indexUrl.includes("registry-files/")) {
          return base + String(rel).replace(/^registry\//, "");
        }
        return base + String(rel);
      }

      function htmlEscape(str) {
        return str.replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#39;");
      }

      async function loadRegistry() {
        try {
          const { url, res } = await fetchFirst(indexCandidates);
          indexLink.href = url;
          const data = await res.json();
          
          if (!Array.isArray(data.packages) || data.packages.length === 0) {
            pkgBody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 40px;">No packages found.</td></tr>';
            return;
          }

          const rows = data.packages.map((pkg, i) => {
            const detailUrl = `./package.html?name=${encodeURIComponent(pkg.name)}`;
            return `
              <tr onclick="window.location='${detailUrl}'" style="cursor: pointer;">
                <td data-label="Package"><a href="${detailUrl}" class="package-name" onclick="event.stopPropagation()">${htmlEscape(pkg.name)}</a></td>
                <td data-label="Version"><span style="color: var(--text-muted); font-size: 0.9rem;">v${htmlEscape(pkg.version)}</span></td>
                <td data-label="Summary" class="summary-text" data-summary-idx="${i}">Loading...</td>
                <td data-label="Actions" style="text-align: right; white-space: nowrap;">
                  <a href="${detailUrl}" class="btn" style="padding: 6px 12px; font-size: 0.8rem; margin-right: 8px;" onclick="event.stopPropagation()">View Details</a>
                  <button class="btn primary" style="padding: 6px 12px; font-size: 0.8rem;" onclick="event.stopPropagation(); copyBuildCommand('${pkg.name}', this)">Copy build</button>
                </td>
              </tr>
            `;
          }).join("");

          pkgBody.innerHTML = rows;

          // Fetch summaries
          data.packages.forEach(async (pkg, i) => {
            const summaryCell = pkgBody.querySelector(`[data-summary-idx="${i}"]`);
            try {
              const res = await fetch(resolvePath(pkg.entry, url));
              const text = await res.text();
              const summaryMatch = text.match(/^\s*SUMMARY:\s*"([^"]+)"/m) || text.match(/^\s*SUMMARY:\s*(.+)$/m);
              summaryCell.innerHTML = summaryMatch ? htmlEscape(summaryMatch[1].trim()) : '<span class="muted">No summary found</span>';
            } catch (_) {
              summaryCell.innerHTML = '<span class="muted">Failed to load</span>';
            }
          });
        } catch (_) {
          pkgBody.innerHTML = `<tr><td colspan="4" style="color: var(--google-red); text-align: center; padding: 40px;">Failed to load registry index.</td></tr>`;
        }
      }

      function copyBuildCommand(name, btn) {
        const cmd = `build ${name} in React`;
        navigator.clipboard.writeText(cmd).then(() => {
          const originalText = btn.textContent;
          btn.textContent = 'Copied!';
          setTimeout(() => { btn.textContent = originalText; }, 2000);
        });
      }

      loadRegistry();
    </script>
  </body>
</html>
