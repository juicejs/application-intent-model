<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AIM Registry v2.2</title>
    <link rel="stylesheet" href="../assets/site.css">
    <!-- 100% privacy-first analytics -->
    <script data-collect-dnt="true" async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
    <style>
      .registry-container {
        background: white;
        border: 1px solid var(--border-light);
        border-radius: 12px;
        box-shadow: var(--shadow-sm);
        margin-top: 24px;
        overflow: hidden;
      }
      .registry-table {
        width: 100%;
        border-collapse: collapse;
      }
      .registry-table th {
        background: var(--bg-secondary);
        color: var(--text-secondary);
        font-weight: 500;
        text-align: left;
        padding: 16px 24px;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border-bottom: 1px solid var(--border-light);
      }
      .registry-table td {
        padding: 20px 24px;
        border-bottom: 1px solid var(--border-light);
        vertical-align: middle;
      }
      .registry-table tr:last-child td {
        border-bottom: none;
      }
      .registry-table tr:hover {
        background: var(--bg-secondary);
      }
      .package-name {
        font-family: var(--font-mono);
        color: var(--google-blue);
        font-weight: 500;
      }
      .summary-text {
        font-size: 0.9rem;
        color: var(--text-secondary);
        line-height: 1.4;
      }
      .preview-pane {
        padding: 40px;
        background: var(--bg-secondary);
        border-top: 1px solid var(--border-light);
      }

      @media (max-width: 768px) {
        .registry-table thead {
          display: none;
        }
        .registry-table td {
          display: block;
          padding: 10px 24px;
          border-bottom: none;
        }
        .registry-table td:first-child {
          padding-top: 24px;
          font-size: 1.2rem;
        }
        .registry-table td:last-child {
          padding-bottom: 24px;
          border-bottom: 1px solid var(--border-light);
          text-align: left !important;
        }
        .registry-table td:last-child .btn {
          width: 100%;
          justify-content: center;
        }
        .registry-table td::before {
          content: attr(data-label);
          display: block;
          font-size: 0.7rem;
          text-transform: uppercase;
          color: var(--text-muted);
          margin-bottom: 4px;
        }
        .preview-pane {
          padding: 24px;
        }
      }
    </style>
  </head>
  <body data-page="registry" data-base="../">
    
    <div class="site-shell">
      <section style="margin-top: 48px;">
        <h1 style="font-weight: 500; margin-bottom: 8px;">Package Registry</h1>
        <p style="color: var(--text-secondary);">
          Discover and materialize intent-driven component packages.
          <a id="index-link" href="../registry-files/index.json" style="color: var(--google-blue); text-decoration: none;">index.json</a>
        </p>
      </section>

      <div class="registry-container">
        <table class="registry-table" aria-label="packages">
          <thead>
            <tr>
              <th>Package</th>
              <th>Version</th>
              <th>Short Summary</th>
              <th style="text-align: right;">Actions</th>
            </tr>
          </thead>
          <tbody id="pkg-body">
            <tr><td colspan="4" style="text-align: center; color: var(--text-muted); padding: 40px;">Loading registry...</td></tr>
          </tbody>
        </table>

        <div class="preview-pane">
          <h2 id="preview-title" style="font-size: 1.2rem; font-weight: 500; margin-bottom: 8px;">Package Details</h2>
          <p id="preview-meta" style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 24px;">Select a package to see full details.</p>
          <pre id="preview" style="background: white; border: 1px solid var(--border); color: var(--text-primary); font-size: 0.85rem;">No package selected.</pre>
        </div>
      </div>

      <footer class="footer" style="text-align: center; margin-top: 80px;">
        <p>AIM Open Standard v2.2 &bull; © 2026 <a href='https://juice.com.hr' target='_blank'>Juice d.o.o.</a> &bull; <a href="../">Home</a> &bull; <a href="../spec/">Specification</a></p>
      </footer>
    </div>

    <script src="../assets/chrome.js"></script>
    <script>
      const indexCandidates = [
        "../registry-files/index.json",
        "/registry-files/index.json",
        "../../registry-files/index.json"
      ];
      const pkgBody = document.getElementById("pkg-body");
      const preview = document.getElementById("preview");
      const previewTitle = document.getElementById("preview-title");
      const previewMeta = document.getElementById("preview-meta");
      const indexLink = document.getElementById("index-link");

      async function fetchFirst(urls) {
        for (const url of urls) {
          try {
            const res = await fetch(url);
            if (res.ok) {
              return { url, res };
            }
          } catch (_) {}
        }
        throw new Error("No candidate path resolved.");
      }

      function toEntryHref(entry, indexUrl) {
        if (indexUrl.includes("registry-files/index.json")) {
          const base = indexUrl.replace(/index\.json$/, "");
          return base + String(entry).replace(/^registry\//, "");
        }
        if (indexUrl.includes("registry/index.json")) {
          const base = indexUrl.replace(/registry\/index\.json$/, "");
          return base + String(entry);
        }
        return String(entry);
      }

      function htmlEscape(str) {
        return str
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function extractSummary(intentText) {
        const blockMatch = intentText.match(/INTENT\s+[A-Za-z0-9_.-]+\s*\{([\s\S]*?)\n\}/m);
        const scope = blockMatch ? blockMatch[1] : intentText;
        const quoted = scope.match(/^\s*SUMMARY:\s*"([^"]+)"/m);
        if (quoted) return quoted[1].trim();
        const bare = scope.match(/^\s*SUMMARY:\s*(.+)$/m);
        if (bare) return bare[1].trim();
        return null;
      }

      async function loadIntent(pkg, indexUrl) {
        const entryHref = toEntryHref(pkg.entry, indexUrl);
        previewTitle.textContent = `Details: ${pkg.name}`;
        previewMeta.innerHTML = `Version ${htmlEscape(pkg.version)} &bull; <a href="${entryHref}" target="_blank" rel="noopener" style="color: var(--google-blue); text-decoration: none;">View Source</a>`;
        preview.textContent = "Loading summary...";

        try {
          const res = await fetch(entryHref);
          if (!res.ok) throw new Error();
          const text = await res.text();
          preview.textContent = text;
        } catch (_) {
          preview.textContent = "Failed to load source.";
        }
      }

      async function loadRegistry() {
        try {
          const { url, res } = await fetchFirst(indexCandidates);
          indexLink.href = url;
          const data = await res.json();
          if (!Array.isArray(data.packages) || data.packages.length === 0) {
            pkgBody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 40px;">No packages found.</td></tr>';
            return;
          }

          const rows = data.packages.map((pkg, i) => {
            return `
              <tr onclick="window.scrollToPackageDetails('${pkg.name}', ${i})" style="cursor: pointer;">
                <td data-label="Package"><span class="package-name">${htmlEscape(pkg.name)}</span></td>
                <td data-label="Version"><span style="color: var(--text-muted); font-size: 0.9rem;">${htmlEscape(pkg.version)}</span></td>
                <td data-label="Summary" class="summary-text" data-summary-idx="${i}">Loading...</td>
                <td data-label="Actions" style="text-align: right; white-space: nowrap;">
                  <button class="btn" style="padding: 6px 12px; font-size: 0.8rem;" data-pkg-idx="${i}">Copy build command</button>
                </td>
              </tr>
            `;
          }).join("");

          pkgBody.innerHTML = rows;

          // Global function for detail loading
          window.scrollToPackageDetails = (name, i) => {
            loadIntent(data.packages[i], url);
          };

          // Fetch summaries
          data.packages.forEach(async (pkg, i) => {
            const entryHref = toEntryHref(pkg.entry, url);
            const summaryCell = pkgBody.querySelector(`[data-summary-idx="${i}"]`);
            try {
              const res = await fetch(entryHref);
              const text = await res.text();
              const summary = extractSummary(text);
              summaryCell.innerHTML = summary ? htmlEscape(summary) : '<span class="muted">No summary found</span>';
            } catch (_) {
              summaryCell.innerHTML = '<span class="muted">Failed to load</span>';
            }
          });

          pkgBody.querySelectorAll("button[data-pkg-idx]").forEach((btn) => {
            btn.addEventListener("click", (e) => {
              e.stopPropagation();
              const idx = Number(btn.getAttribute("data-pkg-idx"));
              copyBuildCommand(data.packages[idx], btn);
            });
          });

          loadIntent(data.packages[0], url);
        } catch (_) {
          pkgBody.innerHTML = `<tr><td colspan="4" style="color: var(--google-red); text-align: center; padding: 40px;">Failed to load registry index.</td></tr>`;
        }
      }

      function copyBuildCommand(pkg, btn) {
        const cmd = `build ${pkg.name} in React`;
        navigator.clipboard.writeText(cmd).then(() => {
          const originalText = btn.textContent;
          btn.textContent = 'Copied!';
          btn.style.color = 'var(--google-green)';
          setTimeout(() => {
            btn.textContent = originalText;
            btn.style.color = '';
          }, 2000);
        });
      }

      loadRegistry();
    </script>
  </body>
</html>
